<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent - Productivity & Engineering Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .logo-emoji {
            margin-right: 8px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-text {
            font-size: 14px;
            color: #666;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .chat-section, .panel-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-section {
            grid-column: 1;
        }

        .panel-section {
            grid-column: 2;
            gap: 20px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .message-input {
            display: flex;
            gap: 8px;
        }

        .message-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        .send-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .roadmap-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
        }

        .roadmap-item {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
        }

        .roadmap-item:hover {
            background: #f9fafb;
        }

        .roadmap-item:last-child {
            border-bottom: none;
        }

        .roadmap-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .roadmap-meta {
            font-size: 12px;
            color: #666;
        }

        .memory-search {
            margin-bottom: 16px;
        }

        .memory-search input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .memory-search input:focus {
            border-color: #667eea;
        }

        .memory-results {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
        }

        .memory-item {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
        }

        .memory-item:hover {
            background: #f9fafb;
        }

        .memory-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .memory-preview {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .memory-date {
            font-size: 11px;
            color: #999;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .action-btn {
            padding: 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #fee;
            border: 1px solid #f88;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .typing-indicator {
            display: none;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .typing-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }

            .chat-section {
                grid-column: 1;
                grid-row: 1;
            }

            .panel-section {
                grid-column: 1;
                grid-row: 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-emoji">🤖</span>
                OpenClaw Agent
            </div>
            <div class="status">
                <div class="status-indicator"></div>
                <span class="status-text">Connected</span>
            </div>
        </div>

        <div class="main-content">
            <!-- Chat Section -->
            <div class="chat-section">
                <div class="section-header">Chat with AI Agent</div>

                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="productivity">Productivity</button>
                    <button class="mode-btn" data-mode="engineering">Engineering</button>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-bubble">
                            Hello! I'm your OpenClaw Agent. I can help you with productivity planning, engineering tasks, roadmap management, and much more. How can I assist you today?
                        </div>
                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    OpenClaw is thinking...
                </div>

                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Type your message here..." />
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>

            <!-- Panel Section -->
            <div class="panel-section">
                <div class="section-header">Quick Actions</div>

                <div class="quick-actions">
                    <button class="action-btn" onclick="quickAction('plan today')">📅 Plan Today</button>
                    <button class="action-btn" onclick="quickAction('create focus block')">🎯 Focus Block</button>
                    <button class="action-btn" onclick="quickAction('show my roadmaps')">🗺️ My Roadmaps</button>
                    <button class="action-btn" onclick="quickAction('search memory project')">🧠 Search Memory</button>
                </div>

                <div class="section-header">Recent Roadmaps</div>
                <div class="roadmap-list" id="roadmapList">
                    <div class="loading">Loading roadmaps...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentMode = 'productivity';
        let currentSessionId = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeChat();
            loadRoadmaps();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Mode selection
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                });
            });

            // Send message
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        }

        async function initializeChat() {
            try {
                // Check API health
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();

                if (data.status === 'ok') {
                    console.log('✅ Connected to OpenClaw Agent');
                } else {
                    showError('Failed to connect to OpenClaw Agent');
                }
            } catch (error) {
                console.error('Health check failed:', error);
                showError('Unable to connect to OpenClaw Agent. Please ensure the server is running.');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Clear input and show typing indicator
            input.value = '';
            showTyping(true);

            // Add user message to chat
            addMessage(message, 'user');

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        userId: 'web-user',
                        sessionId: currentSessionId,
                        includeMemory: true,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    currentSessionId = data.sessionId || currentSessionId;
                    addMessage(data.content, 'assistant');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
                }
            } catch (error) {
                console.error('Failed to send message:', error);
                addMessage('Failed to connect to the agent. Please check your connection.', 'assistant');
            } finally {
                showTyping(false);
            }
        }

        function addMessage(content, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;

            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping(show) {
            const indicator = document.getElementById('typingIndicator');
            if (show) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        }

        async function loadRoadmaps() {
            try {
                const response = await fetch(`${API_BASE}/api/roadmaps`);
                const data = await response.json();

                const roadmapList = document.getElementById('roadmapList');

                if (data.roadmaps && data.roadmaps.length > 0) {
                    roadmapList.innerHTML = data.roadmaps.map(roadmap => `
                        <div class="roadmap-item">
                            <div class="roadmap-name">${roadmap.name}</div>
                            <div class="roadmap-meta">
                                ${roadmap.type} • ${roadmap.status} • ${new Date(roadmap.createdAt).toLocaleDateString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    roadmapList.innerHTML = '<div style="padding: 12px; color: #666;">No roadmaps yet. Create one with the AI agent!</div>';
                }
            } catch (error) {
                console.error('Failed to load roadmaps:', error);
                document.getElementById('roadmapList').innerHTML = '<div style="padding: 12px; color: #c33;">Failed to load roadmaps</div>';
            }
        }

        async function quickAction(action) {
            document.getElementById('messageInput').value = action;
            await sendMessage();
        }

        function showError(message) {
            const chatMessages = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            chatMessages.insertBefore(errorDiv, chatMessages.firstChild);
        }
    </script>
</body>
</html>
